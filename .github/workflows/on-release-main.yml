# Publish to PyPI and deploy docs when a version tag is pushed, a GitHub Release
# is published, or manually (workflow_dispatch).
#
# Prefer `git push origin vX.Y.Z` after the release commit.
name: release-main

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-publish-pypi:
    if: github.repository == 'yoch/modpoll2mqtt'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up poetry
        uses: ./.github/actions/setup-poetry

      - name: Export version
        id: vars
        run: |
          source .venv/bin/activate
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v$(poetry version -s)"
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set package version
        run: |
          source .venv/bin/activate
          poetry version "${{ steps.vars.outputs.version }}"

      - name: Build package
        run: |
          source .venv/bin/activate
          poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  deploy-docs:
    if: github.repository == 'yoch/modpoll2mqtt'
    needs: build-and-publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up poetry
        uses: ./.github/actions/setup-poetry

      - name: Set up pandoc
        uses: ./.github/actions/setup-pandoc

      - name: Install package for doc build
        run: |
          source .venv/bin/activate
          poetry install --only-root --no-interaction

      - name: Build documentation
        run: make docs

      - name: Deploy documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
